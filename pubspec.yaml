name: z_mobile
description: "Z mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  record: ^7.1.0
  path_provider: ^2.1.6
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/z_launcher.png
  adaptive_icon_background: "#F8F6F2"
  adaptive_icon_foreground: assets/icons/z_launcher_foreground.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/z_launcher.png
    - assets/icons/z_launcher_foreground.png
    - assets/images/z_logo.png
